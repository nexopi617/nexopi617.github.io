<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Global - Step 10</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { background: #5e35b1; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nexo Global</h1>
        <p>جاهز لإتمام الخطوة العاشرة</p>
        <button class="btn" onclick="startSetup()">إرسال 0.001 Pi (تجربة)</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function startSetup() {
            try {
                // حل مشكلة الـ Scope
                await Pi.authenticate(['payments', 'username', 'wallet_address'], function(p){});

                // تنفيذ الدفع للمحفظة المتفق عليها
                await Pi.createPayment({
                    amount: 0.001,
                    memo: "تفعيل الخطوة 10 وتأكيد المسارات",
                    metadata: { appId: "nexopi617" },
                }, {
                    onReadyForServerApproval: (paymentId) => { 
                        // هذا هو "مسار الموافقة" الذي طلبه النظام
                        console.log("Approved: " + paymentId); 
                    },
                    onReadyForServerCompletion: (paymentId, txid) => { 
                        // هذا هو "مسار الإكمال"
                        alert("نجحت العملية! رقم المعاملة: " + txid); 
                    },
                    onCancel: (id) => alert("تم الإلغاء"),
                    onError: (err) => alert("خطأ: " + err.message)
                });
            } catch (err) {
                alert("افتح الرابط من Pi Browser حصراً");
            }
        }
    </script>
</body>
</html>
