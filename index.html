<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Global - Test Payment</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        h1 { color: #5e35b1; margin-bottom: 15px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .btn { background: #5e35b1; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #4527a0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nexo Global</h1>
        <p>اضغط أدناه لإرسال 0.001 Pi تجريبي وإتمام الخطوة رقم 10</p>
        <button class="btn" onclick="payNow()">إرسال 0.001 Pi الآن</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function payNow() {
            try {
                // طلب الصلاحيات أولاً لحل مشكلة "payments scope"
                const scopes = ['payments', 'username', 'wallet_address'];
                await Pi.authenticate(scopes, function(p){});

                // تنفيذ عملية الدفع للمحفظة التي زودتني بها
                await Pi.createPayment({
                    amount: 0.001,
                    memo: "عملية تجريبية لتفعيل تطبيق Nexo Global",
                    metadata: { appId: "nexopi617" },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("بانتظار الموافقة...");
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("مبروك! تمت العملية بنجاح. رقم المعاملة: " + txid);
                    },
                    onCancel: (paymentId) => {
                        alert("تم إلغاء عملية الدفع");
                    },
                    onError: (error, payment) => {
                        alert("خطأ: " + error.message);
                    }
                });
            } catch (err) {
                alert("يرجى التأكد من فتح الموقع داخل Pi Browser والموافقة على الصلاحيات");
            }
        }
    </script>
</body>
</html>
