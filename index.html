<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Global</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; border-bottom: 5px solid #ffd700; }
        .btn { width: 100%; padding: 15px; background: #5e35b1; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>NEXO GLOBAL</h1>
        <p>بوابة التوثيق الرقمي</p>
        <button id="btn" class="btn">تأكيد ودفع 0.001 Pi</button>
        <p style="font-size: 12px; color: #533483;">المطور: Mohamed Ammar</p>
    </div>
    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });
        document.getElementById('btn').onclick = function() {
            Pi.authenticate(['payments', 'username'], function(p){}).then(function(auth) {
                Pi.createPayment({
                    amount: 0.001,
                    memo: "Nexo Verification",
                    metadata: { appId: "nexopi617" }
                }, {
                    onReadyForServerApproval: function(id) { console.log("Approved"); },
                    onReadyForServerCompletion: function(id, tx) { alert("تم التوثيق بنجاح!"); },
                    onCancel: function(id) { },
                    onError: function(err) { alert("خطأ: " + err.message); }
                });
            });
        };
    </script>
</body>
</html>
