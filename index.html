<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background:#f4f4f9;">
    <h2>Nexo Global - تأكيد أخير</h2>
    <button id="pay-btn" style="padding:15px 30px; background:#5e35b1; color:white; border:none; border-radius:12px; font-size:20px; cursor:pointer;">دفع 0.001 Pi الآن</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function startProcess() {
            try {
                // 1. تنظيف أي عملية "تدور" قديمة
                await Pi.authenticate(['payments', 'username'], function(payment) {
                    if (payment) {
                        alert("تم العثور على عملية عالقة وجاري معالجتها...");
                    }
                });

                // 2. طلب دفع جديد فوراً
                await Pi.createPayment({
                    amount: 0.001,
                    memo: "Nexo Step 10 Final Fix",
                    metadata: { appId: "nexopi617" }
                }, {
                    onReadyForServerApproval: (id) => console.log("Approved"),
                    onReadyForServerCompletion: (id, tx) => alert("مبروك! تمت بنجاح: " + tx),
                    onCancel: (id) => alert("تم الإلغاء"),
                    onError: (err) => alert("خطأ: " + err.message)
                });
            } catch (e) {
                alert("يرجى المحاولة من متصفح Pi");
            }
        }

        document.getElementById('pay-btn').onclick = startProcess;
    </script>
</body>
</html>
