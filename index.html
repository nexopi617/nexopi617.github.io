<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Global</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #1a1a2e; color: white; text-align: center; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 30px; border-radius: 20px; border-bottom: 5px solid #ffd700; width: 80%; }
        .btn { background: #5e35b1; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h1>NEXO GLOBAL</h1>
        <p>بوابة التوثيق السريع</p>
        <button id="btn" class="btn">تأكيد ودفع 0.001 Pi</button>
        <p style="font-size: 10px; opacity: 0.5;">المطور: Mohamed Ammar</p>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        document.getElementById('btn').onclick = function() {
            Pi.authenticate(['payments', 'username'], function(p){}).then(function(auth) {
                Pi.createPayment({
                    amount: 0.001,
                    memo: "Nexo Verification",
                    metadata: { appId: "nexopi617" }
                }, {
                    // السطر التالي هو السر لتجنب "Paiement expiré"
                    onReadyForServerApproval: (id) => { 
                        console.log("Auto-Approving...");
                    },
                    onReadyForServerCompletion: (id, tx) => { 
                        alert("تم التوثيق بنجاح!"); 
                    },
                    onCancel: (id) => { },
                    onError: (err) => { alert("حاول مرة أخرى بسرعة: " + err.message); }
                });
            });
        };
    </script>
</body>
</html>
