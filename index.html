<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Global - Web3 Payments</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #1c1e21; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #5e35b1; margin-bottom: 10px; }
        p { font-size: 14px; color: #606770; margin-bottom: 20px; }
        .wallet-box { background: #f8f9fa; border: 1px dashed #5e35b1; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 11px; word-break: break-all; margin-bottom: 20px; color: #444; }
        .btn { background: #5e35b1; color: white; border: none; padding: 15px 25px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: background 0.3s; }
        .btn:hover { background: #4527a0; }
        .footer-links { margin-top: 20px; font-size: 12px; }
        .footer-links a { color: #5e35b1; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nexo Global</h1>
        <p>مرحباً بك في مستقبل المدفوعات. هذا التطبيق موثق ومرتبط بمحفظتك.</p>
        
        <div class="wallet-box">
            عنوان المحفظة المستلمة:<br>
            GBHXBLVEZT4ZIXTFO43OWP24FK6GW5BKV54GQDWOGCQ2GIEE2AELC447
        </div>

        <button class="btn" onclick="transferPi()">إرسال 0.001 Pi (تجربة)</button>

        <div class="footer-links">
            <a href="privacy.html">سياسة الخصوصية</a>
            <a href="terms.html">الشروط</a>
        </div>
    </div>

    <script>
        // تهيئة الـ SDK
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function transferPi() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.001,
                    memo: "دفع تجريبي لتطبيق نيكسو - الخطوة 10",
                    metadata: { 
                        appId: "nexo-global",
                        recipient: "GBHXBLVEZT4ZIXTFO43OWP24FK6GW5BKV54GQDWOGCQ2GIEE2AELC447" 
                    },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("بانتظار الموافقة: " + paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("تمت العملية بنجاح! رقم المعاملة: " + txid);
                        // سيقوم نظام Pi الآن بتحديث الخطوة العاشرة تلقائياً
                    },
                    onCancel: (paymentId) => { alert("تم إلغاء العملية"); },
                    onError: (error, payment) => { alert("خطأ: " + error.message); }
                });
            } catch (err) {
                alert("حدث خطأ في النظام: " + err.message);
            }
        }
    </script>
</body>
</html>
