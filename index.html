<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Global - Web3 Payments</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        .btn-payment { background: #5e35b1; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-bold: true; }
        .btn-payment:hover { background: #4527a0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>تطبيق Nexo Global</h1>
        <p>اضغط على الزر أدناه لإتمام الخطوة رقم 10 في متصفح Pi</p>
        
        <button class="btn-payment" onclick="makePayment()">إرسال 0.1 Pi للتجربة</button>
    </div>

    <script>
        // تهيئة الـ SDK
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        // كود عملية الدفع الذي طلبته
        function makePayment() {
            const payment = Pi.createPayment({
                amount: 0.1, 
                memo: "تجربة نظام الدفع في Nexo Global",
                metadata: { appId: "nexopi617" },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("الطلب بانتظار موافقة الخادم: " + paymentId);
                    // في هذه المرحلة التجريبية، النظام سيحاول إكمالها تلقائياً
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("تمت عملية الدفع بنجاح! رقم المعاملة: " + txid);
                },
                onCancel: function(paymentId) {
                    console.log("تم إلغاء الدفع");
                },
                onError: function(error, payment) {
                    console.error("خطأ في الدفع: ", error);
                },
            });
        }
    </script>
</body>
</html>
