<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background:#f4f4f9;">
    <div style="background:white; padding:30px; border-radius:20px; display:inline-block; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
        <h2>Nexo Global</h2>
        <p>جاهز لإتمام الخطوة العاشرة</p>
        <button id="pay-button" style="padding:15px 30px; background:#5e35b1; color:white; border:none; border-radius:12px; font-size:18px; cursor:pointer;">إرسال 0.001 Pi (تجربة)</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        document.getElementById('pay-button').onclick = async () => {
            try {
                await Pi.authenticate(['payments', 'username'], function(p){});
                await Pi.createPayment({
                    amount: 0.001,
                    memo: "Nexo Step 10 Final",
                    metadata: { appId: "nexopi617" }
                }, {
                    onReadyForServerApproval: (id) => console.log(id),
                    onReadyForServerCompletion: (id, tx) => alert("نجحت! المعاملة: " + tx),
                    onCancel: (id) => alert("تم الإلغاء"),
                    onError: (err) => alert("خطأ: " + err.message)
                });
            } catch (e) {
                alert("يرجى استخدام Pi Browser");
            }
        };
    </script>
</body>
</html>
