<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Global | نكسو العالمية</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --primary: #5e35b1; --gold: #ffd700; --dark: #1a1a2e; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--dark); 
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center;
        }
        .card { 
            background: #16213e; 
            padding: 40px 20px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            width: 85%; 
            max-width: 450px; 
            border-bottom: 5px solid var(--gold); 
        }
        .logo { 
            font-size: 40px; 
            font-weight: bold; 
            color: var(--gold); 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }
        h2 { margin: 15px 0; font-size: 24px; color: #fff; }
        p { color: #bdc3c7; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        .pay-btn { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(45deg, var(--primary), #7e57c2); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.4s; 
            box-shadow: 0 5px 15px rgba(94, 53, 177, 0.4);
        }
        .pay-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .footer { 
            margin-top: 25px; 
            font-size: 13px; 
            color: #533483; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">NEXO</div>
    <h2>نكسو العالمية - بوابة التوثيق</h2>
    <p>أهلاً بك يا محمد. تطبيقك الآن متصل بشبكة Pi. يرجى الضغط على الزر أدناه لإتمام عملية الربط الرقمي وتفعيل المشروع رسمياً.</p>
    
    <button id="pay-btn" class="pay-btn">تأكيد ودفع 0.001 Pi</button>
    
    <div class="footer">المطور: Mohamed Ammar &copy; 2026</div>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function startProcess() {
        try {
            const scopes = ['payments', 'username'];
            
            function onIncompletePaymentFound(payment) {
                console.log("Incomplete payment:", payment);
            };

            // بدء عملية المصادقة والدفع
            Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
                Pi.createPayment({
                    amount: 0.001,
                    memo: "التوثيق النهائي لتطبيق نكسو العالمية",
                    metadata: { appId: "nexopi617" }
                }, {
                    onReadyForServerApproval: (id) => console.log("Payment ID:", id),
                    onReadyForServerCompletion: (id, tx) => {
                        alert("تم التوثيق بنجاح! نكسو العالمية الآن في الخدمة.");
                    },
                    onCancel: (id) => console.log("Cancelled"),
                    onError: (err) => alert("تنبيه: " + err.message)
                });
            });
        } catch (e) {
            alert("يرجى فتح الموقع من متصفح Pi Browser فقط");
        }
    }

    document.getElementById('pay-btn').onclick = startProcess;
</script>

</body>
</html>
